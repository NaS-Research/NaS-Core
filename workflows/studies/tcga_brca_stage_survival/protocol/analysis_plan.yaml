schema_version: 1.0.0
study_id: NAS-BRCA-001
protocol_version: 1.0.0
title: Association of pathologic stage with overall survival in TCGA-BRCA
status: pending_review
created_at: 2026-07-20T12:00:00-05:00
objective: >-
  Reproduce the established association between more advanced breast-cancer stage
  and poorer overall survival while validating the first governed, reproducible NaS
  research workflow.
design: Retrospective observational secondary analysis of public TCGA clinical data.

governance:
  source_id: gdc-tcga-open
  purpose: oncology-research
  actor_role: researcher
  classification: public_open

data_requirements:
  - source_id: gdc-tcga-open
    project_id: TCGA-BRCA
    endpoint: https://api.gdc.cancer.gov/cases
    fields:
      - case_id
      - submitter_id
      - demographic.vital_status
      - demographic.days_to_death
      - diagnoses.ajcc_pathologic_stage
      - diagnoses.age_at_diagnosis
      - diagnoses.classification_of_tumor
      - diagnoses.days_to_diagnosis
      - diagnoses.days_to_last_follow_up
      - follow_ups.days_to_follow_up
    notes:
      - Request only open clinical fields; do not request controlled genomic files.
      - Persist the exact request, response metadata, retrieval time, and checksums.
      - Do not hard-code an expected case count because the GDC release can change.

hypotheses:
  - hypothesis_id: H1
    mode: confirmatory
    primary: true
    statement: >-
      TCGA-BRCA participants with advanced pathologic stage (III or IV) have a
      higher all-cause mortality hazard than participants with early pathologic
      stage (I or II), conditional on age at diagnosis.
    null_hypothesis: The adjusted hazard ratio for advanced versus early stage equals 1.
    alternative_hypothesis: >-
      The adjusted hazard ratio for advanced versus early stage does not equal 1,
      with a prespecified expected direction greater than 1.

cohort:
  unit_of_analysis: One TCGA participant represented by one GDC case_id.
  population: Adults in the GDC TCGA-BRCA project with open clinical data.
  inclusion_criteria:
    - GDC project_id equals TCGA-BRCA.
    - Age at diagnosis is at least 18 years and can be converted to years.
    - Vital status is Alive or Dead.
    - AJCC pathologic stage can be normalized to stage I, II, III, or IV.
    - A nonnegative overall-survival time can be derived using the endpoint rules.
  exclusion_criteria:
    - Missing, unknown, or non-normalizable pathologic stage.
    - Missing or non-binary vital status after normalization.
    - Missing, negative, or internally inconsistent survival time.
    - Missing age at diagnosis for the adjusted primary model.
  record_selection:
    - Collapse substages such as IIIA, IIIB, and IIIC to their parent Roman-numeral stage.
    - When multiple diagnosis records exist, prefer a primary-tumor diagnosis with usable pathologic stage.
    - Resolve remaining ties deterministically by earliest nonmissing days_to_diagnosis, then stable source order.
    - Retain a record-level exclusion log and report each exclusion count.

endpoint:
  name: overall_survival
  event: Death from any cause; event equals 1 only when normalized vital_status is Dead.
  time_origin: Date of initial pathologic diagnosis, represented by GDC day offsets.
  time_calculation:
    - For deceased participants, use nonnegative demographic.days_to_death.
    - For living participants, use the maximum nonnegative value across follow_ups.days_to_follow_up and diagnoses.days_to_last_follow_up.
    - Express the final duration in days and preserve the source fields used for derivation.
  censoring: Living participants are right-censored at their last documented follow-up.

variables:
  - name: overall_survival
    role: outcome
    definition: Time in days from diagnosis to death or last documented follow-up.
    coding: Two columns, duration_days as a nonnegative number and event as 0 or 1.
  - name: advanced_pathologic_stage
    role: primary_exposure
    definition: Parent AJCC pathologic stage derived from diagnoses.ajcc_pathologic_stage.
    coding: 1 for stage III or IV; 0 for stage I or II.
  - name: age_at_diagnosis_years
    role: prespecified_covariate
    definition: Age at initial diagnosis derived from diagnoses.age_at_diagnosis.
    coding: Continuous years calculated as days divided by 365.25.

primary_model:
  name: Age-adjusted Cox proportional-hazards model
  method: Cox proportional hazards regression with a two-sided Wald test.
  outcome: overall_survival
  exposure: advanced_pathologic_stage
  covariates:
    - age_at_diagnosis_years
  estimand: Adjusted hazard ratio for advanced stage versus early stage with a 95% confidence interval.
  alpha: 0.05
  diagnostics:
    - Test proportional-hazards assumptions using scaled Schoenfeld residuals.
    - Examine influential observations and report convergence warnings.
    - Report events and participants per exposure group before interpreting the model.

secondary_analyses:
  - Plot Kaplan-Meier estimates by early versus advanced stage with numbers at risk.
  - Report an unadjusted log-rank test and unadjusted Cox model as descriptive secondary analyses.
  - Estimate stage I, II, III, and IV as categorical levels with stage I as the reference when event counts permit.

sensitivity_analyses:
  - analysis_id: S1
    description: Encode parent stage I through IV as an ordinal variable in an age-adjusted Cox model.
    rationale: Evaluate whether the primary binary result is consistent with a monotonic stage gradient.
  - analysis_id: S2
    description: Administratively censor follow-up at five years.
    rationale: Reduce sensitivity to sparse late follow-up and changing hazards over long observation periods.
  - analysis_id: S3
    description: If proportional hazards fail for the exposure, fit a prespecified stage-by-log-time interaction.
    rationale: Quantify time-varying association rather than suppressing a failed model diagnostic.

missing_data:
  primary_strategy: Complete-case analysis for stage, age, vital status, and derived survival time; no imputation.
  reporting:
    - Report missingness for every required field before exclusions.
    - Provide a cohort flow table with mutually exclusive exclusion reasons.
    - Compare age and available outcome status between included and excluded records descriptively.
  sensitivity_strategy: >-
    Treat material differential missingness as a limitation; do not introduce an
    unplanned imputation model into the confirmatory analysis.

multiplicity:
  primary_family: The single H1 exposure coefficient in the age-adjusted primary Cox model.
  primary_adjustment: No multiplicity correction is required for one prespecified primary test.
  secondary_adjustment: >-
    Secondary and sensitivity analyses are supportive and labeled exploratory;
    any families of more than one coefficient use Benjamini-Hochberg false-discovery control.

required_outputs:
  - Frozen source manifest and raw-response checksum.
  - Cohort flow table and missing-data table.
  - Baseline descriptive table stratified by early versus advanced stage.
  - Kaplan-Meier figure with numbers at risk.
  - Primary-model coefficient table with hazard ratio, confidence interval, and p-value.
  - Model diagnostics, warnings, and all sensitivity-analysis results, including null findings.
  - Machine-readable run manifest containing code revision, environment, parameters, and random seeds.

limitations:
  - This retrospective observational analysis cannot establish that stage causes mortality.
  - TCGA recruitment, treatment era, eligibility, and follow-up may limit generalizability.
  - Clinical-field completeness and harmonization can differ across GDC releases.
  - Overall survival does not distinguish breast-cancer death from other causes.
  - The binary stage contrast sacrifices detail and can mask non-monotonic effects.

reviews:
  - reviewer: To be assigned
    role: Independent scientific reviewer
    decision: pending
    reviewed_at: null
    notes: >-
      Confirm the clinical question, diagnosis-record precedence, endpoint derivation,
      covariates, model, and sensitivity analyses before changing status to preregistered.
