study_design: observational_concordance
eligibility: eligible
domains:
  - domain: population_selection
    judgment: some_concerns
    rationale: >-
      The retrospective Stockholm cohort drew tumors diagnosed during 2002–2009 and
      2012 from two hospitals. Of 217 tumors available for digital image analysis,
      prognostic comparisons were restricted to 139 ER-positive/HER2-negative tumors,
      and PAM50 data were available for only 111. The exclusions and incomplete
      molecular-subtype subset may select a nonrepresentative analysis population.
    evidence_locations:
      - Materials and methods — Breast cancer study cohort
      - Materials and methods — Ki67 cut-offs and surrogate subtype classification
      - Results — Surrogate subtypes compared with molecular subtypes
  - domain: specimen_and_measurement
    judgment: some_concerns
    rationale: >-
      Ki67 and cytokeratin were measured in serial FFPE sections from an accredited
      laboratory, with whole-slide digital analysis and pathologist quality control.
      However, the study itself demonstrates that the Ki67 value changes with hotspot
      size, shape, location, and number of counted cells, and virtual dual staining
      depends on successful alignment of adjacent tissue sections.
    evidence_locations:
      - Materials and methods — Immunohistochemistry
      - Materials and methods — Digital image analysis
      - Results — Ki67 hot spot scoring
      - Discussion
  - domain: classifier_implementation
    judgment: some_concerns
    rationale: >-
      Luminal surrogate labels follow a stated St Gallen 2013 rule using ER, PR,
      HER2, and a fixed 20% Ki67 threshold, and digital methods are described.
      Nonetheless, 22 candidate hotspot applications were constructed, the global
      QuPath algorithm was trained in a separate 30-tumor ER-positive cohort, and
      the proprietary application artifacts are not supplied as a frozen,
      independently executable classifier.
    evidence_locations:
      - Materials and methods — Ki67 cut-offs and surrogate subtype classification
      - Materials and methods — Digital image analysis
      - Results — Optimization of hot spot scoring
  - domain: reference_comparator
    judgment: some_concerns
    rationale: >-
      PAM50 subtype calls from previously generated snap-frozen RNA measurements
      provide a molecular comparator for 111 tumors. PAM50 is not an independent
      biological gold standard, the molecular assay was not repeated in this study,
      and tissue preparation differs from the FFPE sections used for IHC. Agreement
      therefore quantifies discordance between methods without identifying the
      correct patient-level label.
    evidence_locations:
      - Materials and methods — PAM50 gene expression-based subtypes
      - Results — Surrogate subtypes compared with molecular subtypes
      - Discussion
  - domain: analysis_and_statistics
    judgment: high
    rationale: >-
      The paper reports ICC, Bland–Altman, survival, Cox, McNemar, and kappa analyses,
      but evaluates 22 hotspot definitions and highlights the application with the
      strongest prognostic performance without a prespecified multiplicity strategy.
      The PAM50 comparison is small, confidence intervals are very wide, category
      counts are limited, and the authors explicitly state that the study is
      underpowered for some subgroup analyses.
    evidence_locations:
      - Materials and methods — Statistical analysis
      - Results — Optimization of hot spot scoring
      - Results — Prognostic potential
      - Discussion
  - domain: validation_and_transportability
    judgment: high
    rationale: >-
      All principal results arise from one retrospective regional cohort, with no
      external validation of the selected hotspot application, global algorithm,
      cutoff, surrogate classification, or survival associations. PAM50 was available
      only for a subset, and the authors require confirmation in a larger cohort
      before clinical implementation. The results do not establish transportability
      across laboratories, platforms, populations, or patient-decision settings.
    evidence_locations:
      - Results — Surrogate subtypes compared with molecular subtypes
      - Discussion
      - Conclusions
  - domain: reporting_and_reproducibility
    judgment: some_concerns
    rationale: >-
      The cohort, stains, scoring variants, software, cutoffs, statistical tests,
      ethics, funding, conflicts, and principal numerical results are reported, and
      supplementary material is identified. Reproduction is limited by absent
      executable analysis code, no frozen environment or immutable data release,
      proprietary Visiopharm applications, and no located data-availability statement.
    evidence_locations:
      - Materials and methods
      - Electronic supplementary material
      - Author contributions
      - Funding
      - Conflict of interest
evidence_role: context_only
key_strengths:
  - Directly compares multiple automated hotspot definitions with global Ki67 scoring.
  - Uses PAM50 calls to quantify disagreement with IHC-based Luminal A/B surrogate labels.
  - Reports agreement, prognostic effect estimates, confidence intervals, and multivariable models.
  - Explicitly acknowledges measurement variability, limited power, and the need for larger validation.
key_limitations:
  - Single retrospective regional cohort with PAM50 available for only 111 tumors.
  - Twenty-two hotspot methods were evaluated without a prespecified multiplicity correction.
  - No external validation of the selected scoring method, cutoff, subtype labels, or outcomes.
  - Neither PAM50 nor the IHC surrogate establishes the biologically correct discordant label.
  - No prospective clinical utility, calibration, decision-impact, or abstention evaluation.
