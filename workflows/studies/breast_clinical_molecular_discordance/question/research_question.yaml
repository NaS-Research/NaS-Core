schema_version: 1.0.0
question_id: NAS-RQ-BRCA002
version: 0.3.0
program_id: NAS-ONC-001
title: Single-sample PAM50 reliability and abstention in HR-positive HER2-negative breast cancer
status: proposed
study_role: discovery
created_at: 2026-07-23T01:30:00-05:00
decision_context:
  intended_user: >-
    Translational breast-cancer researchers deciding whether a research PAM50
    assignment is sufficiently reliable for downstream biological investigation.
  decision_to_support: >-
    Decide whether a tumor's research subtype result is analysis-ready, should be
    reported with an instability warning, or should be withheld through abstention
    before it enters subgroup characterization.
  current_workflow: >-
    Research pipelines commonly return one forced subtype label. Some implementations
    also depend on the other samples in the test cohort, so the same tumor may receive
    a different result when cohort composition changes.
  unmet_need: >-
    There is no validated, transparent NaS workflow that operates on one sample at a
    time, preserves input and preprocessing failures, quantifies margin and repeatability
    under locked technical perturbations, and abstains without claiming diagnostic truth.
  desired_action_change: >-
    Replace the forced-label-only research workflow with a fixed result contract:
    subtype, first and second centroid scores, margin, perturbation repeatability,
    data-quality state, reliability state, and an explicit abstain decision.
  meaningful_outcome: >-
    A reproducible method that determines whether downstream research analyses may use
    a subtype label or must preserve uncertainty, and that transports unchanged from
    TCGA-BRCA discovery to an independent processed SCAN-B cohort.
scientific_question:
  population: >-
    Clinically HR-positive/HER2-negative primary invasive breast tumors with
    interpretable receptor metadata and expression measurements covering the locked
    PAM50 input requirements.
  exposure_or_intervention: >-
    A frozen, patient-independent PAM50 reliability procedure that uses fixed gene
    mappings, transformations, centroids, perturbations, quality rules, margin rules,
    repeatability rules, and abstention logic without reference to other test samples
    or clinical outcomes.
  comparator: >-
    Forced subtype labeling compared with prespecified reliable-label,
    unstable-label, insufficient-data, and abstain states produced by the frozen
    single-sample procedure.
  outcomes:
    - Fraction of samples receiving a valid fixed-configuration PAM50 result.
    - First and second centroid scores and their prespecified margin.
    - Subtype repeatability across a locked, non-outcome-guided perturbation panel.
    - Proportions classified as reliable, unstable, insufficient-data, or abstain.
    - Unchanged external reproduction of the primary reliability outputs in GSE96058.
  time_horizon: Analytical classification of the index primary tumor; no longitudinal endpoint is primary.
  estimand: >-
    Cohort-specific proportions and confidence intervals for each reliability state,
    plus the per-sample repeatability of the top subtype under prespecified technical
    perturbations. These are analytical-reliability estimands, not probabilities of
    biological truth, prognosis, treatment response, or clinical utility.
precision_medicine_rationale:
  - Precision research requires knowing when a molecular label is too unstable to interpret.
  - Abstention can prevent weak subtype assignments from contaminating downstream subgroup analyses.
  - A patient-independent method is necessary if the eventual unit of interpretation is one tumor.
  - Clinical receptor status, research PAM50 output, and biological truth remain distinct constructs.
  - No research output from this study may direct patient testing, diagnosis, prognosis, or treatment.
evidence_needed:
  - Fixed PAM50 implementations that can score one sample independently.
  - Evidence on centering, reference construction, missing genes, platform effects, and measurement error.
  - Studies defining centroid margins, repeatability, uncertainty, calibration targets, or abstention.
  - External validation studies that apply a frozen classifier without outcome-guided adaptation.
  - Explicit evidence that distinguishes analytical repeatability from biological or clinical correctness.
data_feasibility:
  required_modalities:
    - Clinical ER, PR, and HER2 metadata for cohort eligibility only.
    - Primary-tumor gene expression with complete locked PAM50 input coverage.
    - Gene identifiers, genome annotation, expression units, workflow, and sample mappings.
    - Technical-replicate labels where available for secondary repeatability assessment.
  available_sources:
    - Public/open TCGA-BRCA harmonized data through the NCI Genomic Data Commons.
    - Public processed SCAN-B RNA-seq and sample metadata through GEO accession GSE96058.
  missing_sources:
    - Verified receptor-field completeness and assay-definition harmonization.
    - Verified PAM50 gene coverage and alias mapping in both sources.
    - A locked cross-platform transformation that does not use validation outcomes.
    - A defensible external calibration target when no biological gold standard exists.
  requires_real_world_data: false
  public_data_role: >-
    Public research cohorts support analytical method development and external
    reproducibility. They cannot establish clinical validity, clinical utility, or
    a patient-level treatment recommendation.
  known_data_limitations:
    - TCGA is a retrospective research cohort with heterogeneous clinical metadata.
    - GSE96058 exposes processed FPKM expression; raw sequence data are unavailable.
    - GSE96058 overlaps the broader SCAN-B evidence-development literature.
    - Cross-platform differences can be confounded with biological differences.
    - A repeatable centroid assignment is not necessarily a biologically correct assignment.
analysis_families:
  - Deterministic fixed-centroid single-sample scoring and failure-state testing.
  - Descriptive first-versus-second centroid margin analysis.
  - Prespecified technical perturbation and subtype-repeatability analysis.
  - Reliability-state and abstention-rate estimation with confidence intervals.
  - Technical-replicate agreement where explicitly identified.
  - Locked external reproduction in GSE96058 without validation-outcome tuning.
  - Secondary non-outcome clinicopathologic characterization only after the primary analytical release.
validation_path:
  internal_validation: >-
    Test deterministic single-sample invariance, missing-gene behavior, identifier
    mapping, numerical tolerances, perturbation repeatability, abstention boundaries,
    and clean-environment reproduction using synthetic fixtures before real inputs.
  external_validation: >-
    Freeze the complete method in TCGA-BRCA, then run the identical version in
    GSE96058 using only the prespecified platform bridge. Report transport failures
    and abstention rather than adapting the method to improve validation results.
  biological_or_clinical_validation: >-
    This study does not validate biological truth or a clinical assay. Any future
    claim that a reliability state reflects biology, prognosis, treatment response,
    or clinical usefulness requires a separate independently reviewed study.
  deployment_evaluation: >-
    The first deployment is a research workbench artifact with provenance and
    abstention, not a patient-facing or clinician-facing decision-support product.
proposed_system_output: >-
  A versioned NaS single-sample reliability report containing input eligibility,
  quality checks, subtype and runner-up scores, margin, perturbation results,
  repeatability, reliability state, abstention reason, provenance, limitations,
  and evidence links. It is a research artifact, not a clinical test.
scientific_success_criteria:
  - The same sample and frozen inputs produce the same result regardless of other test samples.
  - Missing genes, invalid mappings, and failed transformations produce explicit failure or abstention.
  - All reliability and abstention thresholds are locked before molecular or outcome analysis.
  - Primary reliability-state estimates include uncertainty and retain null or failure-heavy results.
  - The complete frozen method is attempted unchanged in GSE96058.
  - No outcome association is required for the analytical method to be scientifically informative.
decision_success_criteria:
  - Researchers can tell which subtype labels are permitted for downstream study and why.
  - The output clearly separates repeatability, uncertainty, biological interpretation, and clinical validity.
  - A failure or high-abstention result produces a documented stop or redesign decision.
product_success_criteria:
  - Every report field traces to a frozen input, deterministic calculation, rule, or approved evidence source.
  - The method can later become a governed Cortex reliability component without embedding a cohort-dependent classifier.
