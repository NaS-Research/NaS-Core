schema_version: 1.0.0
question_id: NAS-RQ-BRCA002
version: 0.2.0
program_id: NAS-ONC-001
title: Robust and unstable molecular reclassification in HR-positive HER2-negative breast cancer
status: proposed
study_role: discovery
created_at: 2026-07-20T19:00:00-05:00
decision_context:
  intended_user: >-
    Translational breast-cancer researchers and molecular tumor boards evaluating
    where additional molecular characterization deserves formal study.
  decision_to_support: >-
    Prioritize which clinically HR-positive/HER2-negative tumors and research
    settings warrant further study of transcriptomic subtyping, confidence, or abstention.
  current_workflow: >-
    Research pipelines often report one PAM50 label without showing whether the
    assignment persists across defensible preprocessing and classifier implementations.
  unmet_need: >-
    Clinically discordant results can reflect durable tumor biology, analytical
    instability, or both, but these states are rarely separated with reproducible
    definitions, uncertainty, and independent validation.
  desired_action_change: >-
    Distinguish robust non-luminal biology from unstable subtype assignment before
    choosing focused molecular-testing, biomarker, or translational-validation studies.
  meaningful_outcome: >-
    Reproducible evidence identifying whether a clearly defined subgroup merits
    additional molecular characterization and independent clinical-utility study.
scientific_question:
  population: >-
    Clinically HR-positive/HER2-negative primary invasive breast cancers with
    interpretable receptor, transcriptomic, and required clinicopathologic data.
  exposure_or_intervention: >-
    Stability of RNA-expression intrinsic subtype assignment across prespecified,
    defensible PAM50 preprocessing and classifier implementations.
  comparator: >-
    Stable luminal tumors compared with robustly non-luminal and
    classification-unstable tumors under locked consensus and confidence rules.
  outcomes:
    - Proportions of stable luminal, robustly non-luminal, unstable, and unclassifiable tumors.
    - Agreement, transition patterns, centroid margins, and classification confidence.
    - Clinicopathologic, genomic, pathway, and immune correlates where available.
    - Overall-survival association as a secondary exploratory outcome, not a treatment effect.
  time_horizon: Classification at the index primary tumor and available longitudinal follow-up.
  estimand: >-
    Cohort-specific proportions of robust non-luminal and unstable assignments,
    with uncertainty, plus prespecified associations with biological features.
precision_medicine_rationale:
  - Clinically similar tumors can contain heterogeneous molecular programs.
  - A stable non-luminal assignment may identify a focused translational research subgroup.
  - An unstable assignment may require uncertainty reporting or abstention rather than reclassification.
  - No classifier implementation or clinical category is treated as a universal gold standard.
evidence_needed:
  - Definitions and intended uses of receptor-based and intrinsic subtype systems.
  - Prior discordance, PAM50 stability, preprocessing, classifier, and confidence studies.
  - Clinical receptor, RNA-expression, mutation, copy-number, and outcome data.
  - Independent cohort data capable of reproducing the primary classification analysis.
data_feasibility:
  required_modalities:
    - Clinical receptor and clinicopathologic variables.
    - Gene-expression measurements or validated intrinsic-subtype assignments.
    - Somatic alteration data for exploratory characterization.
    - Survival and follow-up data for secondary exploratory analysis.
  available_sources:
    - Public/open TCGA-BRCA data through the NCI Genomic Data Commons, pending exact field assessment.
  missing_sources:
    - An independently approved external validation cohort with compatible subtype and clinical variables.
    - Fit-for-purpose treatment and recurrence data for any later clinical-utility claim.
  requires_real_world_data: false
  public_data_role: >-
    Public data can support discovery and methodological validation, but not a
    patient-level treatment recommendation or clinical-utility claim.
  known_data_limitations:
    - TCGA is a retrospective research cohort with incomplete treatment and follow-up context.
    - Clinical assay methods, thresholds, and missingness can vary across contributing sites.
    - Intrinsic subtype assignment depends on preprocessing, centering, cohort composition, and implementation.
    - Apparent outcome differences may reflect stage, age, treatment, sampling, or other confounding.
analysis_families:
  - Descriptive cross-implementation agreement, transition, and stability analysis.
  - Nearest and second-nearest centroid margin and uncertainty analysis.
  - Multivariable association modeling with prespecified confounders.
  - Transcriptomic pathway and immune-signature characterization.
  - Somatic mutation and copy-number enrichment analysis with multiplicity control.
  - Exploratory survival analysis with diagnostics and explicit noncausal interpretation.
validation_path:
  internal_validation: >-
    Lock implementations and consensus rules, quantify bootstrap uncertainty,
    perturb only prespecified analytical choices, and reproduce from a clean environment.
  external_validation: >-
    Repeat the primary stability categories and prespecified correlates in an
    independent HR-positive/HER2-negative cohort after source and license approval.
  biological_or_clinical_validation: >-
    Seek breast-pathology, molecular-oncology, and biostatistical review; any
    proposed biological mechanism requires independent experimental or clinical evidence.
  deployment_evaluation: >-
    A later project must test whether presenting validated classification
    confidence improves molecular-review decisions without inappropriate action.
proposed_system_output: >-
  A versioned PAM50 stability atlas and evidence report showing stable luminal,
  robust non-luminal, unstable, and unclassifiable groups; transitions; associated
  biology; uncertainty; limitations; and abstention. It is not a patient tool.
scientific_success_criteria:
  - Implementations, consensus rules, and primary estimands are preregistered before outcomes.
  - Stability estimates include uncertainty and survive the prespecified robustness analysis.
  - All molecular analyses control multiplicity and preserve null and contradictory findings.
  - Primary stable and unstable proportions are tested in an independent cohort.
decision_success_criteria:
  - Results identify a specific subgroup and follow-up research decision, or support abstention.
  - Reviewers can distinguish descriptive, prognostic, predictive, and clinical-utility claims.
product_success_criteria:
  - The frozen release can power a traceable public atlas and paper without manual result transcription.
  - The work reveals whether a credible partner, data, and validation path exists for translation.
selection_scores:
  decision_impact: 3
  unmet_need: 3
  scientific_testability: 5
  data_feasibility: 4
  validation_feasibility: 3
  differentiation: 4
  translation_path: 3
  governance_feasibility: 5
