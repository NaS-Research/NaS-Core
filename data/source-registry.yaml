    name: PubMed via NCBI E-utilities
    owner: U.S. National Library of Medicine, National Center for Biotechnology Information
    authoritative_url: https://pubmed.ncbi.nlm.nih.gov/
    classification: public_open
    status: active
    version: current-api-at-snapshot
    access_method: NCBI Entrez Programming Utilities over HTTPS
    approved_purposes:
      - evidence-synthesis
      - research-publication
    intended_uses:
      - Reproducible bibliographic searching and citation inventory
      - Retrieval of identifiers and metadata for human screening
    prohibited_uses:
      - Systematic full-text retrieval outside an explicitly permitted service
      - Redistribution of copyrighted abstracts or publisher content
      - Using source content to train a generative model
      - Exceeding NCBI request-rate and identification requirements
