    authorized_roles:
      - researcher
      - data_steward
      - scientific_reviewer
      - publication_approver
    storage_restrictions:
      - Raw API exports remain outside Git in approved object storage.
      - Abstracts inherit publisher or author copyright and are not redistributed.
      - Requests identify the NaS tool and a valid contact email and remain below three per second.
