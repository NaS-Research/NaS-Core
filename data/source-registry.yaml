    retention_days: null
    review_on: 2027-07-22
    ai_processing_allowed: true
    embeddings_allowed: false
    model_training_allowed: false
    export_allowed: true
    publication_allowed: true
    approvals:
      - approver: Dalron J. Robertson
        role: founder_data_steward
        decision: approve
        decided_at: 2026-07-22T13:07:43-05:00
        rationale: >-
          Approved only for the bounded NAS-BRCA-002 Phase 0 literature audit,
          subject to NCBI rate, contact, attribution, copyright, and storage rules.
    notes:
      - Metadata access does not confer rights to redistribute abstracts or full text.
